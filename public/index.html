<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Rugram</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:300px;
background:#111827;
display:flex;
flex-direction:column;
border-right:1px solid #1f2937;
}

header{
padding:15px;
font-size:18px;
border-bottom:1px solid #1f2937;
}

.user{
display:flex;
align-items:center;
gap:10px;
padding:12px;
cursor:pointer;
border-bottom:1px solid #1f2937;
}

.user:hover{
background:#1f2937;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.status{
width:10px;
height:10px;
border-radius:50%;
margin-left:auto;
}

.online{
background:#22c55e;
}

.offline{
background:#6b7280;
}

/* CHAT */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:65%;
padding:10px;
border-radius:10px;
background:#1e293b;
}

.my{
align-self:flex-end;
background:#3b82f6;
}

.messageInfo{
font-size:11px;
opacity:0.7;
margin-top:5px;
text-align:right;
}

/* SEND */

#sendForm{
display:flex;
gap:8px;
padding:10px;
background:#111827;
border-top:1px solid #1f2937;
}

#messageInput{
flex:1;
padding:8px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

button{
background:#3b82f6;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

#emojiPanel{
display:none;
flex-wrap:wrap;
position:absolute;
bottom:70px;
right:20px;
background:#111827;
padding:10px;
border-radius:10px;
width:200px;
}

.emoji{
cursor:pointer;
font-size:20px;
margin:3px;
}

/* MOBILE */

@media(max-width:700px){

body{
flex-direction:column;
}

#sidebar{
width:100%;
height:40%;
}

#chat{
height:60%;
}

}

</style>

</head>

<body>

<div id="sidebar">

<header>Rugram</header>

<div id="users"></div>

<button onclick="logout()">Выйти</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="emojiPanel"></div>

<form id="sendForm">

<input id="messageInput" placeholder="Сообщение">

<button type="button" id="emojiBtn">😊</button>

<input type="file" id="fileInput">

<button>➤</button>

</form>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

const saved = localStorage.getItem("user")

if(!saved){

location.href="/login.html"

}

const currentUser = JSON.parse(saved)

socket.emit("login",currentUser.id)

let currentChat=null

/* USERS */

async function loadUsers(){

const res=await fetch("/users")

const users=await res.json()

const list=document.getElementById("users")

list.innerHTML=""

users.forEach(u=>{

if(u.id!==currentUser.id){

const div=document.createElement("div")

div.className="user"

div.innerHTML=`

<div class="avatar">${u.username[0]}</div>

${u.username}

<div class="status ${u.online?"online":"offline"}"></div>

`

div.onclick=()=>createChat(u.id)

list.appendChild(div)

}

})

}

loadUsers()

socket.on("onlineUpdate",loadUsers)

/* CREATE CHAT */

async function createChat(userId){

const res=await fetch("/createChat",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

members:[currentUser.id,userId]

})

})

const data=await res.json()

currentChat=data.chat

loadMessages()

}

/* LOAD MESSAGES */

async function loadMessages(){

if(!currentChat)return

const res=await fetch("/data/"+currentUser.id)

const data=await res.json()

const chat=data.chats.find(c=>c.id===currentChat.id)

const box=document.getElementById("messages")

box.innerHTML=""

chat.messages.forEach(m=>{

const div=document.createElement("div")

div.className="message "+(m.userId===currentUser.id?"my":"")

div.innerHTML=`

${m.text || ""}

${m.file?`<a href="${m.file}" target="_blank">📎</a>`:""}

<div class="messageInfo">

${m.time}

${m.userId===currentUser.id?(m.read?"✔✔":"✔"):""}

</div>

`

box.appendChild(div)

})

box.scrollTop=box.scrollHeight

}

/* SEND MESSAGE */

document.getElementById("sendForm").onsubmit=async e=>{

e.preventDefault()

if(!currentChat)return

const text=document.getElementById("messageInput").value
const file=document.getElementById("fileInput").files[0]

const form=new FormData()

form.append("chatId",currentChat.id)
form.append("userId",currentUser.id)
form.append("text",text)

if(file) form.append("file",file)

await fetch("/sendMessage",{

method:"POST",
body:form

})

document.getElementById("messageInput").value=""
document.getElementById("fileInput").value=""

loadMessages()

}

/* EMOJI */

const emojis=["😀","😂","😎","😍","😭","🔥","❤️","👍","🎉","😅","🥳","🤔"]

const panel=document.getElementById("emojiPanel")

emojis.forEach(e=>{

const span=document.createElement("span")

span.className="emoji"

span.textContent=e

span.onclick=()=>{

document.getElementById("messageInput").value+=e

}

panel.appendChild(span)

})

document.getElementById("emojiBtn").onclick=()=>{

panel.style.display=
panel.style.display==="flex"?"none":"flex"

}

/* LOGOUT */

function logout(){

localStorage.removeItem("user")

location.href="/login.html"

}

</script>

</body>

</html>
