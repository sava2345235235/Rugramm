<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rugram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1e;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Screen */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-card h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #667eea;
            font-size: 28px;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .login-card input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .login-card button:first-of-type {
            background: #667eea;
            color: white;
        }

        .login-card button:first-of-type:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .login-card button:last-of-type {
            background: #48bb78;
            color: white;
        }

        .login-card button:last-of-type:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .error {
            color: #e53e3e;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Chat Screen */
        #chatScreen {
            display: flex;
            height: 100vh;
            background: #0f172a;
        }

        .hidden {
            display: none !important;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: #111827;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .user-profile {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
            background: linear-gradient(135deg, #1a1f35, #2d1f3f);
        }

        .user-profile:hover {
            background: linear-gradient(135deg, #1f2545, #322545);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            object-fit: cover;
            border: 2px solid #3B82F6;
        }

        .user-info h4 {
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info p {
            font-size: 14px;
            color: #3B82F6;
        }

        /* Search */
        .search-container {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .search-box {
            background: #1f2937;
            border-radius: 25px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            background: transparent;
            color: white;
        }

        .search-box input::placeholder {
            color: #6b7280;
        }

        .search-box span {
            color: #6b7280;
        }

        /* Chats List */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #1a1f30, #2a1e3c, #1a3a5c);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .chat-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .chat-item.active {
            border-color: #3B82F6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-time {
            color: #6b7280;
            font-size: 12px;
        }

        .chat-last-message {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .last-message-text {
            color: #9ca3af;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .unread-count {
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 12px;
            min-width: 22px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        .chat-header {
            background: linear-gradient(135deg, #1a1f35, #2d1f3f, #1f3a5f);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .chat-header-text h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-header-text p {
            color: #6b7280;
            font-size: 13px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }

        .chat-actions {
            display: flex;
            gap: 12px;
        }

        .call-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .call-button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5);
        }

        .call-button:active {
            transform: scale(0.95);
        }

        .call-button svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #0f172a;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.my-message {
            align-self: flex-end;
        }

        .message.their-message {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message.my-message .message-bubble {
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            color: white;
            border-radius: 20px 20px 5px 20px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .message.their-message .message-bubble {
            background: linear-gradient(135deg, #1a1f30, #2a1e3c, #1a3a5c);
            color: #e5e7eb;
            border-radius: 20px 20px 20px 5px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #9ca3af;
        }

        .message-time {
            font-size: 11px;
            margin-top: 4px;
            color: #6b7280;
        }

        .my-message .message-time {
            text-align: right;
        }

        .message-status {
            font-size: 11px;
            margin-left: 5px;
            color: rgba(255,255,255,0.6);
        }

        .message-file {
            margin-top: 8px;
        }

        .message-file img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .message-file a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            display: inline-block;
        }

        /* Send Form */
        .chat-input-area {
            background: #111827;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1f2937;
            border-radius: 30px;
            padding: 5px;
        }

        .message-input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            background: transparent;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .message-input::placeholder {
            color: #6b7280;
        }

        .attach-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .attach-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5);
        }

        .attach-btn:active {
            transform: scale(0.95);
        }

        .attach-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            transition: transform 0.2s;
        }

        .attach-btn:hover svg {
            transform: rotate(15deg);
        }

        .send-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            border: none;
            margin-right: 3px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
            transition: transform 0.2s;
        }

        .send-btn:hover svg {
            transform: translateX(2px);
        }

        .file-input {
            display: none;
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar,
        .chats-list::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track,
        .chats-list::-webkit-scrollbar-track {
            background: #1f2937;
        }

        .messages-container::-webkit-scrollbar-thumb,
        .chats-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #000000, #1E3A8A, #3B82F6);
            border-radius: 3px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                width: 100%;
                height: 100%;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .chat-area {
                width: 100%;
            }

            .message {
                max-width: 85%;
            }

            .mobile-menu-btn {
                display: block !important;
                background: none;
                border: none;
                font-size: 24px;
                margin-right: 15px;
                cursor: pointer;
                color: white;
            }
        }

        .mobile-menu-btn {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <h2>Rugram</h2>
            <input type="text" id="usernameInput" placeholder="Логин">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <button id="registerBtn">Регистрация</button>
            <div id="error" class="error"></div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="hidden">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="user-profile" id="userProfile">
                <img src="/uploads/default-avatar.png" alt="Avatar" class="avatar" id="userAvatar">
                <div class="user-info">
                    <h4 id="userName"></h4>
                    <p>Online</p>
                </div>
            </div>

            <!-- Search -->
            <div class="search-container">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="Поиск">
                </div>
            </div>

            <!-- Chats List -->
            <div class="chats-list" id="chatsContainer"></div>

            <!-- Logout button -->
            <div class="user-profile" style="border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto;" id="logoutBtn">
                <div class="avatar" style="background: #ef4444; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">🚪</div>
                <div class="user-info">
                    <h4>Выйти</h4>
                    <p>Выход из аккаунта</p>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-info">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                    <div class="chat-header-avatar">👤</div>
                    <div class="chat-header-text">
                        <h3 id="chatName">Выберите чат</h3>
                        <p id="chatStatus"></p>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="call-button" id="audioCallBtn" title="Голосовой звонок">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.4-1.1-.6-2.3-.6-3.6 0-.5-.4-1-1-1H4c-.5 0-1 .4-1 1 0 9.4 7.6 17 17 17 .5 0 1-.4 1-1v-3.5c0-.5-.4-1-1-1z"/>
                        </svg>
                    </button>
                    <button class="call-button" id="videoCallBtn" title="Видеозвонок">
                        <svg viewBox="0 0 24 24">
                            <path d="M17 10.5V7c0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h12c.6 0 1-.4 1-1v-3.5l4 4v-11l-4 4z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messages"></div>

            <div class="chat-input-area">
                <div class="input-container">
                    <button class="attach-btn" id="attachBtn" title="Прикрепить файл">
                        <svg viewBox="0 0 24 24">
                            <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                        </svg>
                    </button>
                    <input type="text" class="message-input" id="messageInput" placeholder="Сообщение">
                    <input type="file" class="file-input" id="fileInput">
                    <button class="send-btn" id="sendBtn" title="Отправить">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
