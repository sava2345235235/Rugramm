<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content" style="width: 400px; max-width: 95%;">
    <h3>Настройки профиля</h3>
    
    <div style="text-align: center; margin: 20px 0; position: relative;">
      <img src="" alt="Avatar" class="preview-avatar" id="settingsAvatar" style="width: 120px; height: 120px; cursor: pointer; border: 3px solid #667eea;">
      <div style="margin-top: 10px;">
        <label for="avatarUpload" style="background: #667eea; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; display: inline-block;">
          📷 Сменить фото
        </label>
        <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
      </div>
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">👤 Имя пользователя</label>
      <input type="text" id="settingsUsername" placeholder="Ваше имя" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px;">
      <p style="font-size: 12px; color: #6b7280; margin-top: 5px;">@<span id="settingsUsernameDisplay"></span></p>
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">🆔 ID пользователя</label>
      <div style="background: #f3f4f6; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 14px; color: #4a5568;" id="settingsUserId"></div>
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">📅 Дата регистрации</label>
      <div style="background: #f3f4f6; padding: 12px; border-radius: 10px; font-size: 14px; color: #4a5568;" id="settingsCreatedAt"></div>
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">🔔 Уведомления</label>
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #f3f4f6; border-radius: 10px;">
        <span>Звук уведомлений</span>
        <label class="switch">
          <input type="checkbox" id="notificationSound" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">🎨 Тема</label>
      <select id="themeSelect" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; background: white;">
        <option value="light">Светлая</option>
        <option value="dark">Темная</option>
        <option value="system">Как в системе</option>
      </select>
    </div>

    <div class="modal-buttons">
      <button class="save-btn" id="saveSettings">Сохранить</button>
      <button class="cancel-btn" id="closeSettings">Отмена</button>
    </div>
  </div>
</div>

<!-- Добавьте стили для переключателя в секцию <style> -->
<style>
  /* Switch toggle */
  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 24px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .3s;
    border-radius: 24px;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
  }

  input:checked + .slider {
    background-color: #667eea;
  }

  input:checked + .slider:before {
    transform: translateX(26px);
  }

  .settings-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 2px solid #e9ecef;
    padding-bottom: 10px;
  }

  .settings-tab {
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.2s;
    font-weight: 500;
  }

  .settings-tab:hover {
    background: #f3f4f6;
  }

  .settings-tab.active {
    background: #667eea;
    color: white;
  }

  .settings-section {
    display: none;
  }

  .settings-section.active {
    display: block;
  }
</style>
