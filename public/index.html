<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rugram - Мессенджер</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1>🚀 Rugram</h1>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="Имя пользователя" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            
            <form id="register-form" class="auth-form">
                <input type="text" id="register-username" placeholder="Имя пользователя" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
            
            <p id="auth-error" class="error"></p>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen">
        <div class="chat-layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <img id="current-user-avatar" src="/uploads/avatars/default.png" alt="Avatar" class="avatar">
                        <span id="current-username">User</span>
                    </div>
                    <button id="logout-btn" class="icon-btn">🚪</button>
                </div>
                
                <div class="search-box">
                    <input type="text" id="search-users" placeholder="Поиск пользователей...">
                </div>
                
                <div id="search-results" class="search-results"></div>
                
                <div class="chats-list" id="chats-list">
                    <!-- Chats will be loaded here -->
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div id="no-chat-selected" class="no-chat">
                    <h2>Выберите чат для начала общения</h2>
                </div>
                
                <div id="active-chat" class="active-chat hidden">
                    <div class="chat-header">
                        <div class="chat-info">
                            <img id="chat-avatar" src="" alt="Avatar" class="avatar">
                            <div>
                                <h3 id="chat-name">Chat Name</h3>
                                <span id="chat-status" class="status">offline</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messages-container">
                        <!-- Messages will be loaded here -->
                    </div>
                    
                    <div class="typing-indicator" id="typing-indicator"></div>
                    
                    <div class="message-input-area">
                        <button id="attach-file" class="icon-btn">📎</button>
                        <input type="file" id="file-input" style="display: none;">
                        <input type="text" id="message-input" placeholder="Напишите сообщение...">
                        <button id="send-message" class="send-btn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
