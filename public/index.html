<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rugram</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f172a;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* Login Screen */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .login-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-card h2 {
      margin-bottom: 20px;
      text-align: center;
      color: #3b82f6;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      border: 1px solid #334155;
    }

    .login-card input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-card button:hover {
      background: #2563eb;
    }

    .login-card button:last-child {
      background: #22c55e;
    }

    .login-card button:last-child:hover {
      background: #16a34a;
    }

    .error {
      color: #ef4444;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    /* Chat Screen */
    #chatScreen {
      display: flex;
      height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #111827;
      border-right: 1px solid #1f2937;
      display: flex;
      flex-direction: column;
    }

    .user-profile {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
      transition: background 0.2s;
    }

    .user-profile:hover {
      background: #1f2937;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #3b82f6;
    }

    .user-info h4 {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .user-info p {
      font-size: 12px;
      color: #9ca3af;
    }

    .chats-header {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1f2937;
    }

    .add-user-btn {
      background: #3b82f6;
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .add-user-btn:hover {
      background: #2563eb;
    }

    .chats-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid #1f2937;
    }

    .chat-item:hover {
      background: #1f2937;
    }

    .chat-item.active {
      background: #2d3748;
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .last-message {
      font-size: 12px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .chat-time {
      font-size: 11px;
      color: #6b7280;
    }

    .unread-count {
      background: #3b82f6;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .online {
      background: #22c55e;
    }

    .offline {
      background: #6b7280;
    }

    /* Main Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f172a;
    }

    .chat-header {
      padding: 20px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .chat-header-info h3 {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .chat-header-info p {
      font-size: 12px;
      color: #9ca3af;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 60%;
      padding: 12px;
      border-radius: 15px;
      position: relative;
      word-wrap: break-word;
    }

    .message.self {
      align-self: flex-end;
      background: #3b82f6;
      border-bottom-right-radius: 5px;
    }

    .message.other {
      align-self: flex-start;
      background: #1f2937;
      border-bottom-left-radius: 5px;
    }

    .message-sender {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #9ca3af;
    }

    .message-text {
      margin-bottom: 5px;
    }

    .message-time {
      font-size: 10px;
      text-align: right;
      color: rgba(255, 255, 255, 0.6);
    }

    .message-status {
      font-size: 10px;
      margin-left: 5px;
    }

    .message-file {
      margin-top: 5px;
    }

    .message-file a {
      color: white;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.2);
      padding: 5px 10px;
      border-radius: 5px;
      display: inline-block;
    }

    .message-file a:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Send Form */
    .send-form {
      padding: 20px;
      background: #111827;
      border-top: 1px solid #1f2937;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .message-input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    .message-input:focus {
      outline: none;
      border: 1px solid #3b82f6;
    }

    .emoji-btn, .file-btn, .send-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .emoji-btn:hover, .file-btn:hover, .send-btn:hover {
      background: #1f2937;
      color: #3b82f6;
    }

    .send-btn {
      background: #3b82f6;
      color: white;
    }

    .send-btn:hover {
      background: #2563eb;
      color: white;
    }

    .file-input {
      display: none;
    }

    /* Emoji Panel */
    .emoji-panel {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: #1f2937;
      border-radius: 10px;
      padding: 10px;
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      width: 250px;
      border: 1px solid #374151;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .emoji-panel.show {
      display: flex;
    }

    .emoji {
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
      transition: background 0.2s;
    }

    .emoji:hover {
      background: #374151;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background: #1f2937;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #3b82f6;
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      border: 1px solid #374151;
    }

    .modal-content input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .save-btn {
      background: #3b82f6;
      color: white;
    }

    .cancel-btn {
      background: #ef4444;
      color: white;
    }

    .preview-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 10px auto;
      display: block;
      border: 3px solid #3b82f6;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: absolute;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s;
      }

      .sidebar.show {
        transform: translateX(0);
      }

      .chat-area {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-card">
      <h2>Rugram</h2>
      <input type="text" id="usernameInput" placeholder="Логин">
      <input type="password" id="passwordInput" placeholder="Пароль">
      <button id="loginBtn">Войти</button>
      <button id="registerBtn">Регистрация</button>
      <div id="error" class="error"></div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="hidden">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="user-profile" id="userProfile">
        <img src="/uploads/default-avatar.png" alt="Avatar" class="avatar" id="userAvatar">
        <div class="user-info">
          <h4 id="userName"></h4>
          <p>Online</p>
        </div>
      </div>

      <div class="chats-header">
        <h3>Чаты</h3>
        <button class="add-user-btn" id="addUserBtn">+</button>
      </div>

      <div class="chats-list" id="chatsContainer"></div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area">
      <div class="chat-header" id="chatHeader">
        <img src="" alt="" class="avatar" id="chatAvatar" style="display: none;">
        <div class="chat-header-info">
          <h3 id="chatName">Выберите чат</h3>
          <p id="chatStatus"></p>
        </div>
      </div>

      <div class="messages-container" id="messages"></div>

      <form class="send-form" id="sendForm">
        <button type="button" class="emoji-btn" id="emojiBtn">😊</button>
        <input type="text" class="message-input" id="messageInput" placeholder="Сообщение">
        <input type="file" class="file-input" id="fileInput">
        <button type="button" class="file-btn" id="fileBtn">📎</button>
        <button type="submit" class="send-btn" id="sendBtn">➤</button>
      </form>

      <div class="emoji-panel" id="emojiPanel"></div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal hidden">
    <div class="modal-content">
      <h3>Редактировать профиль</h3>
      <img src="" alt="Preview" class="preview-avatar" id="profileAvatar">
      <input type="text" id="profileName" placeholder="Имя">
      <input type="text" id="profilePhoto" placeholder="URL аватара">
      <div class="modal-buttons">
        <button class="save-btn" id="saveProfile">Сохранить</button>
        <button class="cancel-btn" id="closeProfile">Отмена</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
