<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rugram</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #fff;
      color: #1a1a1a;
      height: 100vh;
      overflow: hidden;
    }

    /* Login Screen */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-card h2 {
      margin-bottom: 20px;
      text-align: center;
      color: #667eea;
      font-size: 28px;
    }

    .login-card input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .login-card input:focus {
      outline: none;
      border-color: #667eea;
    }

    .login-card button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .login-card button:first-of-type {
      background: #667eea;
      color: white;
    }

    .login-card button:first-of-type:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    .login-card button:last-of-type {
      background: #48bb78;
      color: white;
    }

    .login-card button:last-of-type:hover {
      background: #38a169;
      transform: translateY(-2px);
    }

    .error {
      color: #e53e3e;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    /* Chat Screen */
    #chatScreen {
      display: flex;
      height: 100vh;
      background: #fff;
    }

    .hidden {
      display: none !important;
    }

    /* Sidebar */
    .sidebar {
      width: 350px;
      background: #f8f9fa;
      border-right: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
    }

    .user-profile {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid #e9ecef;
      cursor: pointer;
      transition: background 0.2s;
    }

    .user-profile:hover {
      background: #e9ecef;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #667eea;
    }

    .user-info h4 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .user-info p {
      font-size: 14px;
      color: #667eea;
    }

    /* Search */
    .search-container {
      padding: 15px 20px;
      border-bottom: 1px solid #e9ecef;
    }

    .search-box {
      background: white;
      border-radius: 25px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #e0e0e0;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
    }

    .search-box span {
      color: #9ca3af;
    }

    /* Pinned Chats */
    .pinned-section, .recent-section {
      padding: 15px 20px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
    }

    .pinned-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 5px;
    }

    .pinned-item:hover {
      background: #e9ecef;
    }

    .pinned-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .pinned-info {
      flex: 1;
    }

    .pinned-name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .pinned-name h4 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .pinned-name .time {
      font-size: 11px;
      color: #9ca3af;
    }

    .pinned-message {
      font-size: 13px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      background: #667eea;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 12px;
      min-width: 20px;
      text-align: center;
    }

    /* Chats List */
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 5px;
    }

    .chat-item:hover {
      background: #e9ecef;
    }

    .chat-item.active {
      background: #e9ecef;
    }

    .chat-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .chat-name {
      font-weight: 600;
      font-size: 15px;
      color: #1a1a1a;
    }

    .chat-time {
      font-size: 11px;
      color: #9ca3af;
    }

    .chat-last-message {
      font-size: 13px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .unread-count {
      background: #667eea;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 12px;
    }

    /* Main Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .chat-header {
      padding: 20px 30px;
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .chat-header-info h3 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 5px;
    }

    .chat-header-info p {
      font-size: 13px;
      color: #6b7280;
    }

    .chat-actions {
      display: flex;
      gap: 15px;
    }

    .chat-actions button {
      background: none;
      border: none;
      font-size: 20px;
      color: #6b7280;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .chat-actions button:hover {
      background: #f3f4f6;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: #f8f9fa;
    }

    .message {
      max-width: 45%;
      display: flex;
      flex-direction: column;
    }

    .message.self {
      align-self: flex-end;
    }

    .message.other {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      position: relative;
      word-wrap: break-word;
    }

    .message.self .message-bubble {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .message.other .message-bubble {
      background: white;
      color: #1a1a1a;
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .message-sender {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #6b7280;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.4;
    }

    .message-time {
      font-size: 10px;
      margin-top: 5px;
      text-align: right;
      color: rgba(255,255,255,0.7);
    }

    .message.other .message-time {
      color: #9ca3af;
    }

    .message-status {
      font-size: 10px;
      margin-left: 5px;
    }

    .message-file {
      margin-top: 8px;
    }

    .message-file a {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      padding: 5px 10px;
      border-radius: 15px;
      display: inline-block;
      font-size: 12px;
    }

    .message.other .message-file a {
      background: #f3f4f6;
      color: #1a1a1a;
    }

    /* Send Form */
    .send-form {
      padding: 20px 30px;
      background: #fff;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .message-input {
      flex: 1;
      padding: 15px;
      border: 1px solid #e0e0e0;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .message-input:focus {
      border-color: #667eea;
    }

    .emoji-btn, .file-btn, .send-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 10px;
      border-radius: 50%;
      transition: background 0.2s;
      color: #6b7280;
    }

    .emoji-btn:hover, .file-btn:hover {
      background: #f3f4f6;
    }

    .send-btn {
      background: #667eea;
      color: white;
    }

    .send-btn:hover {
      background: #5a67d8;
    }

    .file-input {
      display: none;
    }

    /* Emoji Panel - ИСПРАВЛЕНО */
    .emoji-panel {
      position: absolute;
      bottom: 80px;
      right: 30px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      width: 280px;
      border: 1px solid #e9ecef;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 1001;
    }

    .emoji-panel.show {
      display: flex;
    }

    .emoji {
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .emoji:hover {
      background: #f3f4f6;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(5px);
    }

    .modal.hidden {
      display: none !important;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      max-width: 95%;
      max-height: 80vh;
      overflow-y: auto;
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #1a1a1a;
      font-size: 20px;
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .modal-content input:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }

    .modal-buttons button:hover {
      transform: translateY(-2px);
    }

    .save-btn {
      background: #667eea;
      color: white;
    }

    .save-btn:hover {
      background: #5a67d8;
    }

    .cancel-btn {
      background: #e53e3e;
      color: white;
    }

    .cancel-btn:hover {
      background: #c53030;
    }

    .preview-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 10px auto;
      display: block;
      border: 3px solid #667eea;
      object-fit: cover;
    }

    /* Switch toggle */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #667eea;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    /* User Search Results */
    .user-search-item {
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      background: #f3f4f6;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .user-search-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
      border-color: #667eea;
    }

    .user-search-item img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #667eea;
    }

    .user-search-item .user-info {
      flex: 1;
    }

    .user-search-item .user-name {
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .user-search-item .user-status {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.online {
      background: #48bb78;
      box-shadow: 0 0 0 2px rgba(72, 187, 120, 0.2);
    }

    .status-dot.offline {
      background: #9ca3af;
    }

    /* Mobile Styles */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1000;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .sidebar.show {
        transform: translateX(0);
      }

      .chat-area {
        width: 100%;
      }

      .message {
        max-width: 75%;
      }

      .messages-container {
        padding: 15px;
      }

      .send-form {
        padding: 15px;
      }

      .emoji-panel {
        right: 15px;
        bottom: 80px;
        width: 250px;
      }

      .mobile-menu-btn {
        display: block !important;
        background: none;
        border: none;
        font-size: 24px;
        margin-right: 15px;
        cursor: pointer;
        color: #667eea;
      }

      .chat-header {
        padding: 15px;
      }

      .modal-content {
        width: 95%;
        padding: 20px;
      }
    }

    .mobile-menu-btn {
      display: none;
    }

    /* Add User Button */
    .add-user-btn-small {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
    }

    .add-user-btn-small:hover {
      transform: scale(1.1);
      background: #5a67d8;
    }

    .add-user-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      z-index: 1000;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-user-btn:hover {
      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
    }

    /* Loading Spinner */
    .spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Empty States */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
    }

    .empty-state span {
      font-size: 48px;
      display: block;
      margin-bottom: 10px;
    }

    /* Call Modal Styles */
    #remoteVideo, #localVideo {
      background: #1a1a1a;
      transform: scaleX(-1);
    }

    #localVideo {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 80px;
      height: 80px;
      border-radius: 10px;
      border: 2px solid white;
      object-fit: cover;
    }

    #remoteVideo {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-card">
      <h2>Rugram</h2>
      <input type="text" id="usernameInput" placeholder="Логин">
      <input type="password" id="passwordInput" placeholder="Пароль">
      <button id="loginBtn">Войти</button>
      <button id="registerBtn">Регистрация</button>
      <div id="error" class="error"></div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="hidden">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="user-profile" id="userProfile">
        <img src="/uploads/default-avatar.png" alt="Avatar" class="avatar" id="userAvatar">
        <div class="user-info">
          <h4 id="userName"></h4>
          <p>Online</p>
        </div>
      </div>

      <!-- Search -->
      <div class="search-container">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Поиск">
        </div>
      </div>

      <!-- Pinned Chats -->
      <div class="pinned-section">
        <div class="section-title">
          <span>Закрепленные</span>
          <span>📌</span>
        </div>
        <div id="pinnedContainer"></div>
      </div>

      <!-- Recent Chats -->
      <div class="recent-section">
        <div class="section-title">
          <span>Недавние</span>
          <button class="add-user-btn-small" id="addUserBtn" title="Добавить пользователя">+</button>
        </div>
        <div class="chats-list" id="chatsContainer"></div>
      </div>

      <!-- Logout button -->
      <div class="user-profile" style="border-top: 1px solid #e9ecef; margin-top: auto;" id="logoutBtn">
        <div class="avatar" style="background: #e53e3e; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">🚪</div>
        <div class="user-info">
          <h4>Выйти</h4>
          <p>Выход из аккаунта</p>
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area">
      <div class="chat-header">
        <div class="chat-header-info">
          <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
          <img src="" alt="" class="avatar" id="chatAvatar" style="display: none;">
          <div>
            <h3 id="chatName">Выберите чат</h3>
            <p id="chatStatus"></p>
          </div>
        </div>
        <div class="chat-actions">
          <button id="audioCallBtn" title="Аудиозвонок">🎤</button>
          <button id="videoCallBtn" title="Видеозвонок">📹</button>
          <button id="callInfoBtn" title="Информация">ℹ️</button>
        </div>
      </div>

      <div class="messages-container" id="messages"></div>

      <form class="send-form" id="sendForm" onsubmit="return false;">
        <button type="button" class="emoji-btn" id="emojiBtn">😊</button>
        <input type="text" class="message-input" id="messageInput" placeholder="Сообщение">
        <input type="file" class="file-input" id="fileInput">
        <button type="button" class="file-btn" id="fileBtn">📎</button>
        <button type="submit" class="send-btn" id="sendBtn">➤</button>
      </form>

      <div class="emoji-panel" id="emojiPanel"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <h3>Настройки профиля</h3>
      
      <div style="text-align: center; margin: 20px 0; position: relative;">
        <img src="" alt="Avatar" class="preview-avatar" id="settingsAvatar" style="width: 120px; height: 120px; cursor: pointer; border: 3px solid #667eea;">
        <div style="margin-top: 10px;">
          <label for="avatarUpload" style="background: #667eea; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; display: inline-block;">
            📷 Сменить фото
          </label>
          <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
        </div>
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">👤 Имя пользователя</label>
        <input type="text" id="settingsUsername" placeholder="Ваше имя" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px;">
        <p style="font-size: 12px; color: #6b7280; margin-top: 5px;">@<span id="settingsUsernameDisplay"></span></p>
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">🆔 ID пользователя</label>
        <div style="background: #f3f4f6; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 14px; color: #4a5568;" id="settingsUserId"></div>
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">📅 Дата регистрации</label>
        <div style="background: #f3f4f6; padding: 12px; border-radius: 10px; font-size: 14px; color: #4a5568;" id="settingsCreatedAt"></div>
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">🔔 Уведомления</label>
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #f3f4f6; border-radius: 10px;">
          <span>Звук уведомлений</span>
          <label class="switch">
            <input type="checkbox" id="notificationSound" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; color: #4a5568; font-weight: 600;">🎨 Тема</label>
        <select id="themeSelect" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; background: white;">
          <option value="light">Светлая</option>
          <option value="dark">Темная</option>
          <option value="system">Как в системе</option>
        </select>
      </div>

      <div class="modal-buttons">
        <button class="save-btn" id="saveSettings">Сохранить</button>
        <button class="cancel-btn" id="closeSettings">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Add User Modal -->
  <div id="addUserModal" class="modal hidden">
    <div class="modal-content">
      <h3>Добавить пользователя</h3>
      <div style="text-align: center; margin-bottom: 15px;">
        <span style="font-size: 48px;">👤</span>
      </div>
      <input type="text" id="addUsernameInput" placeholder="@username">
      <div id="userSearchResults" style="max-height: 250px; overflow-y: auto; margin: 15px 0;"></div>
      <div class="modal-buttons">
        <button class="save-btn" id="confirmAddUser">Добавить</button>
        <button class="cancel-btn" id="closeAddUser">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Call Modal -->
  <div id="callModal" class="modal hidden">
    <div class="modal-content" style="text-align: center; width: 350px;">
      <div id="incomingCall" style="display: none;">
        <h3>Входящий звонок</h3>
        <div style="margin: 20px 0;">
          <img src="" alt="" id="callerAvatar" class="preview-avatar" style="width: 100px; height: 100px;">
          <h4 id="callerName"></h4>
          <p id="callType"></p>
        </div>
        <div style="display: flex; gap: 20px; justify-content: center;">
          <button class="cancel-btn" id="rejectCall" style="width: 60px; height: 60px; border-radius: 50%; font-size: 24px;">📞</button>
          <button class="save-btn" id="acceptCall" style="width: 60px; height: 60px; border-radius: 50%; font-size: 24px; background: #48bb78;">📞</button>
        </div>
      </div>

      <div id="outgoingCall" style="display: none;">
        <h3>Исходящий звонок</h3>
        <div style="margin: 20px 0;">
          <img src="" alt="" id="calleeAvatar" class="preview-avatar" style="width: 100px; height: 100px;">
          <h4 id="calleeName"></h4>
          <p>Звоним...</p>
        </div>
        <button class="cancel-btn" id="cancelCall" style="width: 60px; height: 60px; border-radius: 50%; font-size: 24px; margin: 0 auto;">📞</button>
      </div>

      <div id="activeCall" style="display: none;">
        <h3>Разговор</h3>
        <div style="margin: 20px 0; position: relative;">
          <video id="remoteVideo" autoplay playsinline style="width: 100%; border-radius: 10px; background: #1a1a1a;"></video>
          <video id="localVideo" autoplay playsinline muted style="width: 80px; height: 80px; border-radius: 10px; position: absolute; bottom: 10px; right: 10px; border: 2px solid white;"></video>
        </div>
        <div style="display: flex; gap: 20px; justify-content: center;">
          <button class="cancel-btn" id="endCall" style="width: 60px; height: 60px; border-radius: 50%; font-size: 24px;">📞</button>
          <button class="save-btn" id="toggleMute" style="width: 60px; height: 60px; border-radius: 50%; font-size: 24px; background: #667eea;">🎤</button>
          <button class="save-btn" id="toggleVideo" style="width: 60px; height: 60px; border-radius: 50%; font-size: 24px; background: #667eea;">📹</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
