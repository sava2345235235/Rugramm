<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Регистрация — Rugram</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:#111827;
padding:30px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

a{
color:#3b82f6;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Регистрация</h2>

<input id="username" placeholder="Логин">

<input id="password" type="password" placeholder="Пароль">

<button onclick="register()">Создать аккаунт</button>

<p>Уже есть аккаунт? <a href="/login.html">Войти</a></p>

</div>

<script>

async function register(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

const res=await fetch("/register",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({username,password})

})

const data=await res.json()

if(data.success){

alert("Аккаунт создан")

location.href="/login.html"

}else{

alert(data.error)

}

}

</script>

</body>

</html>
